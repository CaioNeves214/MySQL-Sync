name: Deploy API to Linux Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_PORT: ${{ secrets.DB_PORT }}
          API_TOKEN: ${{ secrets.API_TOKEN }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DB_HOST,DB_USER,DB_PASSWORD,DB_DATABASE,DB_PORT,API_TOKEN,DEPLOY_PATH
          script: |
            # Navega ate o diretorio do projeto usando a variavel de ambiente
            cd $DEPLOY_PATH
            
            # Atualiza o codigo fonte
            git pull origin main
            
            # Cria o arquivo .env usando Heredoc (mais seguro que multiplos echos)
            # As variaveis sao substituidas internamente na sessao SSH
            cat <<EOF > servidor/.env
            DB_HOST=$DB_HOST
            DB_USER=$DB_USER
            DB_PASSWORD=$DB_PASSWORD
            DB_DATABASE=$DB_DATABASE
            DB_PORT=$DB_PORT
            API_TOKEN=$API_TOKEN
            EOF
            
            # Define permissoes restritas (somente dono pode ler/escrever)
            chmod 600 servidor/.env
            
            # Instala/Atualiza dependencias
            pip install -r servidor/requirements.txt
            
            # Reinicia o servico da API
            sudo systemctl restart tabela_federada.service
